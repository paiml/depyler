# Clippy configuration
# See: https://rust-lang.github.io/rust-clippy/master/index.html#configuration

# Enforce maximum cognitive complexity per function
cognitive-complexity-threshold = 25

# Allow unwrap in tests (unwrap is natural in test assertions)
allow-unwrap-in-tests = true

# unwrap() enforcement: workspace lints set `unwrap_used = "warn"` (catches non-test code),
# and `allow-unwrap-in-tests = true` (above) exempts test code. No need for disallowed-methods
# duplication — the lint system handles both cases.
